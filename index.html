    <!-- SCRIPT DE LÓGICA -->
    <script>
        const PRECIO_CIGARRO = 150;
        let carrito = [];

        function cleanNum(str) {
            if (!str) return '';
            return str.toString().replace(/\D/g, '');
        }

        function formatNum(numStr) {
            if (!numStr) return '';
            return numStr.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function formatCLP(num) {
            return "$" + formatNum(num);
        }

        function formatInput(element) {
            let num = cleanNum(element.value);
            element.value = num ? formatNum(num) : '';
        }

        function agregarAlCarrito(precio, descripcion) {
            carrito.push({ id: Date.now(), precio: precio, desc: descripcion });
            renderCarrito();
            actualizarVuelto();
            
            // Hacer scroll hasta abajo en el carrito
            setTimeout(() => {
                let cont = document.getElementById('contenedor-carrito');
                cont.scrollTop = cont.scrollHeight;
            }, 50);
        }

        function eliminarProducto(id) {
            carrito = carrito.filter(function(item) { return item.id !== id; });
            renderCarrito();
            actualizarVuelto();
        }

        function renderCarrito() {
            const contCarrito = document.getElementById('contenedor-carrito');
            const listaCarrito = document.getElementById('lista-carrito');
            const carritoVacio = document.getElementById('carrito-vacio');
            const txtTotalVenta = document.getElementById('texto-total-venta');

            if (carrito.length === 0) {
                contCarrito.classList.add('hidden');
                carritoVacio.classList.remove('hidden');
                txtTotalVenta.textContent = "$0";
            } else {
                contCarrito.classList.remove('hidden');
                carritoVacio.classList.add('hidden');
                
                let html = '';
                let total = 0;
                for(let i=0; i<carrito.length; i++) {
                    let item = carrito[i];
                    total += item.precio;
                    
                    // Diferenciar color según si es cigarro o producto normal
                    let isCigarro = item.desc.includes('Cigarro');
                    let color = isCigarro ? 'text-amber-500' : 'text-indigo-500';
                    let descFormat = item.desc === 'Producto' ? 'PROD' : item.desc.toUpperCase();

                    html += `
                        <div class="flex justify-between items-center bg-white p-2.5 rounded-lg border border-slate-100 shadow-sm">
                            <div class="flex items-center gap-2">
                                <div class="bg-indigo-50 w-7 h-7 rounded-full flex items-center justify-center text-indigo-600 font-black text-xs shrink-0">${i + 1}</div>
                                <div>
                                    <span class="text-[10px] ${color} font-bold block leading-none">${descFormat}</span>
                                    <span class="font-black text-slate-700 text-sm leading-tight">${formatCLP(item.precio)}</span>
                                </div>
                            </div>
                            <button type="button" onclick="eliminarProducto(${item.id})" class="text-red-300 hover:text-red-500 active:scale-90 p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    `;
                }
                listaCarrito.innerHTML = html;
                txtTotalVenta.textContent = formatCLP(total);
            }
        }

        // ==============================================
        // NUEVA FUNCIÓN PARA AGREGAR PRODUCTOS CON MULTIPLICADOR
        // ==============================================
        
        // Función para los botones de + y -
        function cambiarCantidad(delta) {
            let input = document.getElementById('input-cant-producto');
            let actual = Number(cleanNum(input.value)) || 0;
            let nuevo = actual + delta;
            
            // Que nunca baje de 1
            if (nuevo < 1) nuevo = 1; 
            
            input.value = nuevo;
        }

        function agregarProductoNormal() {
            let inputPrecio = document.getElementById('input-precio-producto');
            let inputCant = document.getElementById('input-cant-producto');
            
            let precio = Number(cleanNum(inputPrecio.value));
            
            // Si la cantidad está en blanco, se asume 1
            let strCant = cleanNum(inputCant.value);
            let cant = strCant ? Number(strCant) : 1;
            
            if (precio > 0 && cant > 0) {
                let totalItem = precio * cant;
                
                // Generar descripción. Ej: "3x a $300"
                let descripcion = cant > 1 ? `${cant}x a ${formatCLP(precio)}` : 'Producto';
                
                agregarAlCarrito(totalItem, descripcion);
                
                // Limpiar casillas (El precio se borra, la cantidad vuelve a 1)
                inputPrecio.value = '';
                inputCant.value = '1';
                
                // Volver a poner el cursor en el precio por si quiere seguir sumando rápido (opcional en celular)
                // inputPrecio.focus(); 
            }
        }

        function agregarCigarroCant() {
            let input = document.getElementById('input-cig-cant');
            let cant = cleanNum(input.value);
            if (cant && Number(cant) > 0) {
                agregarAlCarrito(Number(cant) * PRECIO_CIGARRO, cant + ' Cigarros');
                input.value = '';
            }
        }

        function calcularHintCigarro() {
            let input = document.getElementById('input-cig-dinero');
            let hint = document.getElementById('hint-cig-dinero');
            let d
